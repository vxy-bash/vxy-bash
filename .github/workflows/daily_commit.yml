name: Daily Activity Boost

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write  # WICHTIG: Erlaubt dem Bot das Pushen

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixt die Node-Warnung
    steps:
      - uses: actions/checkout@v4

      - name: Run Script
        run: python daily_update.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "action@github.com"
          git add activity_log.txt
          git commit -m "chore: daily activity sync" || exit 0
          git push