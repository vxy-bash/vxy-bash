name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: vxy-bash
          template: classic
          base: header, repositories
          config_timezone: Europe/Berlin
          # Theme muss direkt unter 'with' stehen
          config_presets: https://metrics.lecoq.io/terminal 
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no # Wir schalten Charts aus, um den "Unexpected Error" zu umgehen, bis du mehr Daten hast