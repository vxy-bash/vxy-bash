name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: vxy-bash
          template: classic
          base: header, repositories
          config_timezone: Europe/Berlin
          # Wir nutzen jetzt das offizielle Theme-Feld richtig:
          config_display: large
          config_padding: 0, 8 + 11%
          theme: tokyonight # TokyoNight ist extrem beliebt und stabil
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_lines: yes
          # Habits lassen wir weg, bis dein Profil mehr Futter hat, um Fehler zu vermeiden